# ============================================================================
#  Configuration Nginx du front-end
#  Double rôle :
#    1) servir les fichiers statiques de l'application Vue (le /dist)
#    2) faire office de REVERSE PROXY vers le backend pour tout ce qui commence
#       par /api  ->  le navigateur ne parle JAMAIS directement au backend.
#  --------------------------------------------------------------------------
#  Intérêt côté Docker / sécurité :
#    - Un SEUL port est exposé au monde extérieur (le 80 du front, publié en
#      8080 sur l'hôte). Le backend n'a aucun port publié.
#    - Le front et le backend communiquent par le réseau Docker interne
#      (résolution du nom "backend" par le DNS de Docker).
# ============================================================================

server {
    listen 80;
    server_name localhost;

    # Racine : les fichiers statiques produits par "npm run build" (Vue/Vite).
    root /usr/share/nginx/html;
    index index.html;

    # --- 1) Service du front (Single Page Application) ----------------------
    # try_files : si le fichier demandé n'existe pas, on renvoie index.html.
    # C'est nécessaire pour une SPA (le routeur côté client gère les URLs).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- 2) Reverse proxy vers le backend -----------------------------------
    # Toute requête /api/... est transmise au conteneur "backend" sur le port 3000.
    # "backend" est le NOM DU SERVICE défini dans docker-compose.yml : il est
    # résolu automatiquement par le DNS interne de Docker (127.0.0.11) vers
    # l'IP du conteneur backend sur le réseau "frontend-net".
    #
    # Astuce d'écriture : proxy_pass SANS chemin final (pas de "/" après le port)
    # => Nginx conserve l'URI d'origine. /api/tasks est donc transmis tel quel
    #    à http://backend:3000/api/tasks (le backend expose bien des routes /api/...).
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
