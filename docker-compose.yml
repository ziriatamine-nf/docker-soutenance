services:


  frontend:
    build:
      context: ./front         
      dockerfile: Dockerfile
  
    image: ${DOCKERHUB_USER}/todo-frontend:v1.0
    container_name: todo-frontend
    restart: unless-stopped   
 
    ports:
      - "8080:80"
    networks:
      - frontend-net           
    depends_on:
      backend:
        condition: service_healthy  


  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USER}/todo-backend:v1.0
    container_name: todo-backend
    restart: unless-stopped
   
    environment:
      DB_HOST: db               
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      PORT: 3000
   
    networks:
      - frontend-net           
      - backend-net             
    depends_on:
      db:
        condition: service_healthy   

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 10s          
      timeout: 5s              
      retries: 5               
      start_period: 20s       


  db:
    image: mariadb:11.4        
    container_name: todo-db
    restart: unless-stopped
 
    env_file:
      - .env
 
    networks:
      - backend-net
    volumes:
     
      - db_data:/var/lib/mysql
 
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
  
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s        


networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true              


volumes:
  db_data:
